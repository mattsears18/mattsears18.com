version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Major bumps deferred deliberately — re-enable by removing the matching
    # ignore entry when the migration is scheduled. See issues for context.
    ignore:
      # eslint 10 is blocked by eslint-config-next's base parser (its
      # scopeManager lacks the addGlobals API eslint 10 requires).
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
      npm-major:
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
      actions-major:
        update-types:
          - major
